<rect width="1600" height="900" fill="#FFFFFF"/>
<line x1="96" y1="90" x2="1504" y2="90" stroke="#DCE6F0" stroke-width="2"/>
<line x1="96" y1="810" x2="1504" y2="810" stroke="#DCE6F0" stroke-width="2"/>
<rect x="640" y="128" width="320" height="50" rx="25" fill="#9C113B"/>
<text x="800" y="161" text-anchor="middle" font-size="26" font-weight="700" fill="#FFFFFF" font-family="Microsoft YaHei, PingFang SC, sans-serif">第 4 课 · AI时代领导力</text>
<text x="800" y="240" text-anchor="middle" font-size="54" font-weight="700" fill="#1E477C" font-family="Microsoft YaHei, PingFang SC, sans-serif">学员最需要带走的 3 个知识点</text>
<rect x="170" y="410" width="1260" height="94" rx="28" fill="#F5F8FC" stroke="#DCE6F0" stroke-width="2"/>
<circle cx="216" cy="457" r="24" fill="#9C113B"/>
<text x="216" y="465" text-anchor="middle" font-size="24" font-weight="700" fill="#FFFFFF" font-family="Microsoft YaHei, PingFang SC, sans-serif">1</text>
<text x="262" y="434" font-size="34" font-weight="700" fill="#1E477C" font-family="Microsoft YaHei, PingFang SC, sans-serif">AI 时代领导力不再只是在领导人，而是同时要领导人、领导 AI、领</text>
<text x="262" y="474" font-size="34" font-weight="700" fill="#1E477C" font-family="Microsoft YaHei, PingFang SC, sans-serif">导人机协作</text>
<rect x="170" y="518" width="1260" height="94" rx="28" fill="#F5F8FC" stroke="#DCE6F0" stroke-width="2"/>
<circle cx="216" cy="565" r="24" fill="#9C113B"/>
<text x="216" y="573" text-anchor="middle" font-size="24" font-weight="700" fill="#FFFFFF" font-family="Microsoft YaHei, PingFang SC, sans-serif">2</text>
<text x="262" y="542" font-size="34" font-weight="700" fill="#1E477C" font-family="Microsoft YaHei, PingFang SC, sans-serif">领导者的重点正在从分配任务，转向设定方向、培养判断力和管理情</text>
<text x="262" y="582" font-size="34" font-weight="700" fill="#1E477C" font-family="Microsoft YaHei, PingFang SC, sans-serif">感</text>
<rect x="170" y="626" width="1260" height="94" rx="28" fill="#F5F8FC" stroke="#DCE6F0" stroke-width="2"/>
<circle cx="216" cy="673" r="24" fill="#9C113B"/>
<text x="216" y="681" text-anchor="middle" font-size="24" font-weight="700" fill="#FFFFFF" font-family="Microsoft YaHei, PingFang SC, sans-serif">3</text>
<text x="262" y="650" font-size="34" font-weight="700" fill="#1E477C" font-family="Microsoft YaHei, PingFang SC, sans-serif">真正关键的不是让 AI 替代人，而是设计好人和 AI 的分工、边界、流</text>
<text x="262" y="690" font-size="34" font-weight="700" fill="#1E477C" font-family="Microsoft YaHei, PingFang SC, sans-serif">程与风险控制</text>
</svg>