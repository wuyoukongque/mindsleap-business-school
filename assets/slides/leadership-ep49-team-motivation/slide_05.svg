<text x="257" y="515.0" font-size="34" font-weight="700" fill="#1E477C" font-family="Microsoft YaHei, PingFang SC, sans-serif">精进：人会被成长感驱动，特别是在 AI 时代，学会新工具和新方法本身</text>
