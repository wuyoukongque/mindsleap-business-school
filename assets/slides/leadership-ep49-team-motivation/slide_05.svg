<text x="257" y="407.0" font-size="34" font-weight="700" fill="#1E477C" font-family="Microsoft YaHei, PingFang SC, sans-serif">自主：让团队知道结果要什么，但在方法上保留空间，这样人才会真正投</text>
<text x="257" y="445.0" font-size="34" font-weight="700" fill="#1E477C" font-family="Microsoft YaHei, PingFang SC, sans-serif">入</text>
