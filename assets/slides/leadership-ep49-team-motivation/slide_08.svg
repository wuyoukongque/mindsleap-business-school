<line x1="96" y1="810" x2="1504" y2="810" stroke="#DCE6F0" stroke-width="2"/>
<rect x="640" y="128" width="320" height="50" rx="25" fill="#9C113B"/>
<text x="800" y="161" text-anchor="middle" font-size="26" font-weight="700" fill="#FFFFFF" font-family="Microsoft YaHei, PingFang SC, sans-serif">第 2 课 · AI时代领导力</text>
<text x="800" y="240" text-anchor="middle" font-size="54" font-weight="700" fill="#1E477C" font-family="Microsoft YaHei, PingFang SC, sans-serif">学员最需要带走的 3 个知识点</text>
<rect x="170" y="410" width="1260" height="94" rx="28" fill="#F5F8FC" stroke="#DCE6F0" stroke-width="2"/>
<circle cx="216" cy="457" r="24" fill="#9C113B"/>
<text x="216" y="465" text-anchor="middle" font-size="24" font-weight="700" fill="#FFFFFF" font-family="Microsoft YaHei, PingFang SC, sans-serif">1</text>
<text x="262" y="434" font-size="34" font-weight="700" fill="#1E477C" font-family="Microsoft YaHei, PingFang SC, sans-serif">团队激励不能只靠钱，真正持续驱动人的，是成长、认可、责任和自主</text>
<text x="262" y="474" font-size="34" font-weight="700" fill="#1E477C" font-family="Microsoft YaHei, PingFang SC, sans-serif">权</text>
<rect x="170" y="518" width="1260" height="94" rx="28" fill="#F5F8FC" stroke="#DCE6F0" stroke-width="2"/>
<circle cx="216" cy="565" r="24" fill="#9C113B"/>
<text x="216" y="573" text-anchor="middle" font-size="24" font-weight="700" fill="#FFFFFF" font-family="Microsoft YaHei, PingFang SC, sans-serif">2</text>
<text x="262" y="542" font-size="34" font-weight="700" fill="#1E477C" font-family="Microsoft YaHei, PingFang SC, sans-serif">判断团队问题前，要先看团队处在哪个发展阶段，不同阶段要用不同</text>
<text x="262" y="582" font-size="34" font-weight="700" fill="#1E477C" font-family="Microsoft YaHei, PingFang SC, sans-serif">带法</text>
<rect x="170" y="626" width="1260" height="94" rx="28" fill="#F5F8FC" stroke="#DCE6F0" stroke-width="2"/>
<circle cx="216" cy="673" r="24" fill="#9C113B"/>
<text x="216" y="681" text-anchor="middle" font-size="24" font-weight="700" fill="#FFFFFF" font-family="Microsoft YaHei, PingFang SC, sans-serif">3</text>
<text x="262" y="650" font-size="34" font-weight="700" fill="#1E477C" font-family="Microsoft YaHei, PingFang SC, sans-serif">AI 时代的激励新命题，是正面回应焦虑，把变化转化成成长与升级动</text>
<text x="262" y="690" font-size="34" font-weight="700" fill="#1E477C" font-family="Microsoft YaHei, PingFang SC, sans-serif">力</text>
