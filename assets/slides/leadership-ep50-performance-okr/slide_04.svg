<text x="257" y="407.0" font-size="34" font-weight="700" fill="#1E477C" font-family="Microsoft YaHei, PingFang SC, sans-serif">OKR 是目标与关键结果，先定一个清楚而有挑战的目标，再用几个关键</text>
<text x="257" y="445.0" font-size="34" font-weight="700" fill="#1E477C" font-family="Microsoft YaHei, PingFang SC, sans-serif">结果判断有没有在靠近它</text>
