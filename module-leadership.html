<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>AI时代领导力 · 模块章节</title>
  <style>
    :root{--blue:#1E477C;--red:#9C113B;--text:#12263F;--muted:#667A96;--border:#DCE6F0;--soft:#EEF4FA;--shadow:0 14px 34px rgba(18,38,63,.08)}
    *{box-sizing:border-box} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,"PingFang SC","Microsoft YaHei",sans-serif;background:linear-gradient(180deg,#F8FBFE 0%,#EEF4F8 100%);color:var(--text)}
    .wrap{width:min(1120px,100%);margin:0 auto;padding:20px 16px 44px}.page-top{display:flex;align-items:center;justify-content:space-between;gap:12px}.brand{display:flex;align-items:center;gap:6px}.brand-logo{display:block;height:26px;width:auto;object-fit:contain}.brand-text{font-size:16px;font-weight:800;color:#1E477C;line-height:1;display:inline-flex;align-items:center;transform:translateY(1px)}.back{color:var(--blue);text-decoration:none;font-weight:800;font-size:13px}.card{background:#fff;border:1px solid var(--border);border-radius:24px;box-shadow:var(--shadow)}.hero{margin-top:16px;padding:26px}.pill{display:inline-flex;padding:7px 10px;border-radius:999px;background:#EEF4FA;color:var(--blue);font-size:12px;font-weight:800}h1{margin:14px 0 10px;color:var(--blue);font-size:36px;line-height:1.15}.lead{max-width:920px;color:var(--muted);font-size:15px;line-height:1.85}.hero-meta{display:flex;flex-wrap:wrap;gap:10px;margin-top:14px}.hero-meta span{display:inline-flex;padding:7px 10px;border-radius:999px;background:#F7FAFE;border:1px solid var(--border);color:var(--muted);font-size:12px;font-weight:700}.layout{display:grid;grid-template-columns:minmax(0,1.15fr) minmax(300px,.85fr);gap:16px;margin-top:18px}.section{padding:20px}.section h2{margin:0 0 14px;color:var(--blue);font-size:20px}.chapter-list{display:grid;gap:12px}.chapter{display:grid;grid-template-columns:auto 1fr auto;gap:14px;align-items:start;padding:16px;border-radius:18px;background:#fff;border:1px solid var(--border)}.chapter.in-progress{border-color:rgba(156,17,59,.28);box-shadow:0 12px 28px rgba(156,17,59,.08);background:#FFFDFE}.chapter-no{width:34px;height:34px;border-radius:999px;background:#EEF4FA;color:var(--blue);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;flex:0 0 auto}.chapter.in-progress .chapter-no{background:var(--red);color:#fff}.chapter h3{margin:0;color:var(--blue);font-size:17px}.chapter p{margin:6px 0 0;color:var(--muted);font-size:13px;line-height:1.75}.status{display:inline-flex;padding:6px 9px;border-radius:999px;background:#EEF4FA;color:var(--blue);font-size:11px;font-weight:800;white-space:nowrap}.status.in-progress{background:rgba(156,17,59,.08);color:var(--red)}.status.done{background:rgba(30,71,124,.08);color:var(--blue)}.status.locked{background:#F5F7FA;color:#7F91A8}.chapter-actions{margin-top:12px;display:flex;gap:10px;flex-wrap:wrap}.btn{display:inline-flex;align-items:center;justify-content:center;min-height:42px;padding:0 14px;border-radius:12px;text-decoration:none;font-size:13px;font-weight:800}.btn-primary{background:var(--red);color:#fff}.btn-secondary{background:#fff;color:var(--blue);border:1px solid var(--border)}.side-grid{display:grid;gap:12px}.mini-card{padding:16px;border-radius:18px;background:#F8FBFE;border:1px solid var(--border)}.mini-card strong{display:block;color:var(--blue);font-size:14px;margin-bottom:6px}.mini-card p{margin:0;color:var(--muted);font-size:13px;line-height:1.75}.path-list{display:grid;gap:10px}.path-item{padding:14px;border-radius:16px;background:#fff;border:1px solid var(--border)}.path-item strong{display:block;color:var(--blue);font-size:14px}.path-item span{display:block;margin-top:6px;color:var(--muted);font-size:12px;line-height:1.7}@media(max-width:920px){.layout{grid-template-columns:1fr}h1{font-size:30px}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="page-top"><div class="brand"><img class="brand-logo" src="./assets/img/MindsLeap-Logo-blue-260322.png" alt="MindsLeap" /><span class="brand-text">商学院</span></div><a class="back" id="backLink" href="./map.html?entry=sequence">← 返回学习地图</a></div>
    <section class="card hero"><div class="pill" id="modulePill"></div><h1 id="moduleTitle"></h1><div class="lead" id="moduleLead"></div><div class="hero-meta" id="heroMeta"></div></section>
    <div class="layout"><main class="card section"><h2>AI时代领导力模块全部章节</h2><div class="chapter-list" id="chapterList"></div></main><aside class="card section"><h2 id="sideTitle"></h2><div class="side-grid" id="sideGrid"></div><div style="margin-top:16px"><h2 id="pathTitle" style="margin-bottom:12px"></h2><div class="path-list" id="pathList"></div></div></aside></div>
  </div>
  <script src="./assets/config/config-registry.js"></script>
  <script src="./assets/js/module-runtime.js"></script>
  <script src="./assets/config/module-leadership.js"></script>
  <script>const entryMode = new URLSearchParams(window.location.search).get('entry') || 'sequence'; window.MindsLeapModuleRuntime.initModulePage({ ...window.MindsLeapConfigs.modules.leadership, entryMode });</script>
</body>
</html>
